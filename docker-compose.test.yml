version: '3.8'

services:
  hapi-fhir:
    image: hapiproject/hapi:v7.2.0
    ports:
      - "8081:8080"
    environment:
      - spring.datasource.url=jdbc:h2:mem:test_mem
      - spring.datasource.username=
      - spring.datasource.password=
      - spring.datasource.driverClassName=org.h2.Driver
      - spring.jpa.properties.hibernate.dialect=ca.uhn.fhir.jpa.model.dialect.HapiFhirH2Dialect
      - hapi.fhir.enforce_referential_integrity_on_write=false
      - hapi.fhir.enforce_referential_integrity_on_delete=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/fhir/metadata"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  healthcheck:
    image: curlimages/curl:latest
    depends_on:
      hapi-fhir:
        condition: service_healthy
    command: >
      sh -c "
        echo 'FHIR server is ready' &&
        curl -f http://hapi-fhir:8080/fhir/metadata &&
        exit 0
      "
